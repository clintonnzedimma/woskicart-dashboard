<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WoskiCart Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="../../assets/css/style.css" rel="stylesheet" />
    <link href="../../assets/css/custom.css" rel="stylesheet" />
  </head>
  <body class="theme-default">
    <div class="loader-overlay"><div class="loader-spinner"></div></div>
    <div class="alert-container"></div>
    <main class="login-wrapper">
      <div class="card login-card p-4 p-md-5">
        <div class="login-logo shadow-soft">
          <span>WC</span>
        </div>
        <div class="text-center mb-4">
          <h1 class="h4 fw-bold mb-1">Welcome back to WoskiCart</h1>
          <p class="text-muted-soft">Sign in to access your ecommerce control center.</p>
        </div>
        <form id="loginForm" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email address</label>
            <input type="email" class="form-control form-control-lg" id="loginEmail" placeholder="name@example.com" required />
            <div class="invalid-feedback">Please enter your email.</div>
          </div>
          <div class="mb-4">
            <label for="loginPassword" class="form-label">Password</label>
            <input type="password" class="form-control form-control-lg" id="loginPassword" placeholder="••••••••" required />
            <div class="invalid-feedback">Please enter your password.</div>
          </div>
          <button type="submit" class="btn btn-glossy w-100 py-3">
            <span class="fw-semibold">Sign In</span>
          </button>
          <div class="d-flex justify-content-between align-items-center mt-3 small text-muted-soft">
            <a href="#" class="text-decoration-none">Forgot password?</a>
            <div class="d-flex align-items-center gap-2 theme-switcher">
              <span class="text-muted-soft">Theme:</span>
              <button class="btn btn-outline-primary btn-sm" type="button" data-theme-select="default">Default</button>
              <button class="btn btn-outline-light btn-sm" type="button" data-theme-select="dark">Dark</button>
              <button class="btn btn-outline-info btn-sm" type="button" data-theme-select="custom">Custom</button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-3fabf3R8bJ2Q6W2PumoefRg2fzGEylZmCtbY2AJ3GzU=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../../assets/js/main.js"></script>
  </body>
</html>
